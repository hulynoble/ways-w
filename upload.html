<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Photos - Ways & Means</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #faf9f7;
      margin: 0;
      padding: 40px 20px;
      color: #111827;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    h1 {
      margin: 0 0 8px;
    }

    h1 span {
      color: #c9a961;
    }

    .intro {
      color: #6b7280;
      margin: 0 0 30px;
    }

    .upload-box {
      border: 2px dashed #e5e7eb;
      border-radius: 14px;
      padding: 40px;
      text-align: center;
      transition: 0.2s;
      margin-bottom: 20px;
      cursor: pointer;
      display: block;
    }

    .upload-box:hover {
      border-color: #c9a961;
      background: #faf9f7;
    }

    input[type="file"] {
      display: none;
    }

    .btn {
      padding: 12px 28px;
      background: #c9a961;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .preview img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .caption-input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    .msg {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }

    .msg.success {
      background: #d1fae5;
      color: #065f46;
    }

    .msg.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .back {
      color: #c9a961;
      text-decoration: none;
      font-weight: 500;
      display: inline-block;
      margin-bottom: 12px;
    }

    .upload-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .upload-help {
      color: #6b7280;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back">← Back to Site</a>

    <h1>Upload <span>Event Photos</span></h1>
    <p class="intro">Upload JPG, PNG, or WebP. Max 5MB each, 10 files at once.</p>

    <div class="msg" id="msg"></div>

    <form id="uploadForm">
      <label for="fileInput" class="upload-box">
        <div class="upload-icon">📸</div>
        <strong>Click to select photos</strong><br>
        <span class="upload-help">or drag and drop here</span>
      </label>

      <input type="file" id="fileInput" name="photos" multiple accept="image/*">

      <div class="preview" id="preview"></div>
      <div id="captionFields"></div>

      <button type="submit" class="btn" id="submitBtn" disabled>Upload Photos</button>
    </form>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const captionFields = document.getElementById('captionFields');
    const submitBtn = document.getElementById('submitBtn');
    const msg = document.getElementById('msg');
    const form = document.getElementById('uploadForm');

    fileInput.addEventListener('change', () => {
      preview.innerHTML = '';
      captionFields.innerHTML = '';

      if (fileInput.files.length > 0) {
        submitBtn.disabled = false;

        [...fileInput.files].forEach(file => {
          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          preview.appendChild(img);

          const input = document.createElement('input');
          input.type = 'text';
          input.name = 'captions';
          input.placeholder = `Caption for ${file.name}`;
          input.className = 'caption-input';
          captionFields.appendChild(input);
        });
      } else {
        submitBtn.disabled = true;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Uploading...';
      msg.style.display = 'none';

      const formData = new FormData();
      [...fileInput.files].forEach(file => formData.append('photos', file));
      [...document.querySelectorAll('input[name="captions"]')].forEach(input => formData.append('captions', input.value));

      try {
        const res = await fetch('/upload', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (res.ok) {
          msg.className = 'msg success';
          msg.textContent = `Uploaded ${data.count} photo(s) successfully!`;
          msg.style.display = 'block';

          form.reset();
          preview.innerHTML = '';
          captionFields.innerHTML = '';
        } else {
          throw new Error(data.error);
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = err.message || 'Upload failed';
        msg.style.display = 'block';
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Upload Photos';
    });
  </script>
</body>
</html>
