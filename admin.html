<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Ways & Means</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 40px 20px;
      color: #111827;
    }

    .container {
      max-width: 1040px;
      margin: 0 auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    h1 span {
      color: #c9a961;
    }

    .intro {
      color: #6b7280;
      margin: 0 0 24px;
      line-height: 1.6;
    }

    .panel-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    .panel-intro {
      max-width: 640px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 24px;
    }

    .panel-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #111827;
      font-size: 1.15rem;
    }

    input,
    select {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 14px;
      box-sizing: border-box;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #c9a961;
      box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.14);
    }

    .btn {
      padding: 12px 22px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.98rem;
    }

    .btn-danger {
      background: #b91c1c;
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .user-list {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      min-height: 180px;
    }

    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .user-item:last-child {
      border-bottom: none;
    }

    .role {
      font-size: 0.78rem;
      padding: 3px 9px;
      border-radius: 999px;
      background: #e5e7eb;
    }

    .role.admin {
      background: #c9a961;
      color: white;
    }

    .role.staff {
      background: #2563eb;
      color: white;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 0;
      display: none;
      width: 100%;
      max-width: 420px;
    }

    .msg.success {
      background: #dcfce7;
      color: #166534;
    }

    .msg.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .back {
      color: #c9a961;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 10px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 26px 18px;
      }

      .panel-header {
        margin-bottom: 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .user-item {
        align-items: flex-start;
        flex-direction: column;
      }

      .msg {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel-header">
      <div class="panel-intro">
        <a href="/" class="back">← Back to Site</a>
        <h1>Admin <span>Panel</span></h1>
        <p class="intro">Manage user accounts, assign roles, and keep access organized in one place.</p>
      </div>

      <div class="msg" id="msg"></div>
    </div>

    <div class="grid">
      <div class="panel-card">
        <h3>Add New User</h3>

        <form id="addUserForm">
          <input type="text" id="newUsername" placeholder="Username" required>
          <input type="password" id="newPassword" placeholder="Password" required>

          <select id="newRole" required>
            <option value="">Select Role</option>
            <option value="admin">Admin - Full access</option>
            <option value="staff">Staff - Upload photos</option>
            <option value="client">Client - View only</option>
          </select>

          <button type="submit" class="btn">Add User</button>
        </form>
      </div>

      <div class="panel-card">
        <h3>Current Users</h3>
        <div class="user-list" id="userList"></div>
      </div>
    </div>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const userList = document.getElementById('userList');

    function showMsg(text, type) {
      msg.className = 'msg ' + type;
      msg.textContent = text;
      msg.style.display = 'block';

      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    async function loadUsers() {
      const res = await fetch('/api/users');
      const users = await res.json();

      userList.innerHTML = users.map(user => `
        <div class="user-item">
          <div>
            <strong>${user.username}</strong>
            <span class="role ${user.role}">${user.role}</span>
          </div>
          <button class="btn btn-danger" onclick="deleteUser('${user.username}')">Delete</button>
        </div>
      `).join('');
    }

    async function deleteUser(username) {
      if (!confirm(`Delete user ${username}?`)) {
        return;
      }

      const res = await fetch('/api/users/' + username, { method: 'DELETE' });
      const data = await res.json();

      if (res.ok) {
        showMsg('User deleted', 'success');
        loadUsers();
      } else {
        showMsg(data.error, 'error');
      }
    }

    document.getElementById('addUserForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('newUsername').value,
          password: document.getElementById('newPassword').value,
          role: document.getElementById('newRole').value
        })
      });

      const data = await res.json();

      if (res.ok) {
        showMsg('User added', 'success');
        e.target.reset();
        loadUsers();
      } else {
        showMsg(data.error, 'error');
      }
    });

    loadUsers();
  </script>
</body>
</html>
