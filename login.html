<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ways & Means Creative Deco</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      color: #111827;
    }

    .box {
      background: #ffffff;
      padding: 40px 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      text-align: left;
      animation: slide 0.35s ease;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
      border: 1px solid #e5e7eb;
    }

    @keyframes slide {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      margin: 0 0 10px;
      color: #111827;
      font-size: 1.9rem;
      text-align: center;
    }

    h2 span {
      color: #c9a961;
    }

    .subtitle {
      color: #6b7280;
      margin: 0 0 22px;
      font-size: 0.96rem;
      line-height: 1.5;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 14px;
      box-sizing: border-box;
      transition: 0.2s;
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: #c9a961;
      box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.14);
    }

    button {
      width: 100%;
      padding: 13px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1f2937;
    }

    .error {
      color: #b91c1c;
      font-size: 0.9rem;
      margin-bottom: 12px;
      display: none;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Ways & <span>Means</span></h2>
    <p class="subtitle">Sign in to access the staff portal.</p>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <p class="error" id="error">Invalid username or password.</p>

    <button onclick="login()">Sign In</button>
  </div>

  <script>
    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value,
          password: document.getElementById('password').value
        })
      });

      if (res.ok) {
        location.reload();
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }

    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
